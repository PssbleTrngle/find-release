name: Test

on:
   workflow_dispatch:
   push:

env:
   CI: true

concurrency:
   group: ${{ github.workflow }}-${{ github.ref }}
   cancel-in-progress: true

permissions:
   contents: write

jobs:
   unit:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2

         - name: Install Dependencies
           run: bun install --frozen-lockfile

         - name: Run tests
           run: bun test
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

   integration:
      runs-on: ubuntu-latest
      steps:
         - uses: actions/checkout@v6

         - name: run action
           id: action
           uses: ./
           with:
              type: draft
              token: ${{ secrets.GITHUB_TOKEN }}

         - run: echo ${{ steps.action.outputs.matched }}
         - run: jq ${{ steps.action.outputs.match }} | echo
         - run: echo ${{ steps.action.outputs.match.name }}
